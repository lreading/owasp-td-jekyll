name: Release Gem

on:
  push:
    tags: [ "v*" ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install

      - name: Install accessibility tooling
        run: npm ci

      - name: Accessibility audit
        run: npm run check:accessibility

      - name: Set gemspec version from tag
        run: |
          GEMSPEC_FILE="owasp-td-jekyll.gemspec"
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"

          CURRENT_VERSION=$(grep -E "spec.version\s*=" "$GEMSPEC_FILE" | sed -E "s/.*['\"]([0-9]+\.[0-9]+\.[0-9]+)['\"].*/\1/")
          echo "Gemspec version before: $CURRENT_VERSION"

          sed -i -E "s/(spec\.version\s*=\s*['\"])$CURRENT_VERSION(['\"])/\1$TAG_VERSION\2/" "$GEMSPEC_FILE"

          echo "Gemspec version set to: $TAG_VERSION"

      - name: Build gem
        run: |
          gem build owasp-td-jekyll.gemspec

      - uses: rubygems/release-gem@6317d8d1f7e28c24d28f6eff169ea854948bd9f7 # v1.2.0
