name: Release Gem

on:
  push:
    tags: [ "v*" ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: npm

      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install

      - name: Install accessibility tooling
        run: npm ci

      - name: Accessibility audit
        run: npm run check:accessibility

      - name: Set gemspec version from tag
        run: |
          GEMSPEC_FILE="owasp-td-jekyll.gemspec"
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"

          CURRENT_VERSION=$(grep -E "spec.version\s*=" "$GEMSPEC_FILE" | sed -E "s/.*['\"]([0-9]+\.[0-9]+\.[0-9]+)['\"].*/\1/")
          echo "Gemspec version before: $CURRENT_VERSION"

          sed -i -E "s/(spec\.version\s*=\s*['\"])$CURRENT_VERSION(['\"])/\1$TAG_VERSION\2/" "$GEMSPEC_FILE"

          echo "Gemspec version set to: $TAG_VERSION"

      - name: Build gem
        run: |
          gem build owasp-td-jekyll.gemspec

      - uses: rubygems/release-gem@6317d8d1f7e28c24d28f6eff169ea854948bd9f7 # v1.2.0
